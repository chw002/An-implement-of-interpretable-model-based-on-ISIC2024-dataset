# GlassDerm — image-only configuration
# -------------------------------------
# Every value the experiment depends on lives here (or is overridden via
# `-o key=value`).  The scale-experiment driver (scripts/run_scale_experiment.py)
# snapshots this file into each scale's output directory for auditability.

project:
  name: glassderm
  seed: 1337
  device: auto                  # "auto" | "cuda" | "cpu"

data:
  raw_dir: /home/chw/222/data/raw/isic2024_official
  images_dir: ${data.raw_dir}/ISIC_2024_Permissive_Training_Input
  gt_csv: ${data.raw_dir}/ISIC_2024_Permissive_Training_GroundTruth.csv
  supplement_csv: ${data.raw_dir}/ISIC_2024_Permissive_Training_Supplement.csv
  metadata_csv: ${data.images_dir}/metadata.csv

  processed_dir: data/processed
  features_dir: data/features
  cache_dir: data/cache

  # ``null`` means "keep every benign" → the "full" scale.
  sample:
    keep_all_malignant: true
    n_benign: null
    seed: 1337

  split:
    method: patient_disjoint
    val_fraction: 0.15
    test_fraction: 0.15
    seed: 1337

  features_cache: data/features/transparent_features.parquet

  # This list is informational — it documents what the audit forbids.
  forbidden_metadata_prefixes: [tbp_lv_, tbp_, iddx, mel_, anatom_]
  forbidden_metadata_exact:
    - age_approx
    - sex
    - anatom_site_general
    - clin_size_long_diam_mm
    - image_type
    - tbp_tile_type
    - attribution
    - copyright_license
    - A
    - B
    - C
    - D

image:
  size: 224
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]

train:
  batch_size: 64
  num_workers: 4
  epochs: 3
  lr: 3.0e-4
  weight_decay: 1.0e-4
  optimizer: adamw
  scheduler: cosine
  backbone: efficientnet_b0
  pretrained: true
  amp: true
  concept_loss_weight: 1.0
  label_loss_weight: 1.0
  grad_clip: 1.0
  log_every: 50

pipelines:
  multitask_cnn:
    enabled: true
  hard_cbm:
    enabled: true
    concept_sup_weight: 2.0
  glassbox_nam:
    enabled: true
    hidden: 64
    concept_sup_weight: 2.0
  transparent_lr:
    enabled: true
    logistic_c: 0.5
  transparent_tree:
    enabled: true
    max_depth: 4
    min_samples_leaf: 30

evaluate:
  # Validation-only strategies; the "fixed" strategy is NOT recommended except
  # for debugging contract tests.
  threshold_strategy: youden    # "youden" | "f1" | "fixed"
  fixed_threshold: 0.5

outputs:
  root: outputs
  checkpoints: ${outputs.root}/checkpoints
  tables: ${outputs.root}/tables
  figures: ${outputs.root}/figures
  reports: ${outputs.root}/reports
  case_studies: ${outputs.root}/case_studies
  logs: ${outputs.root}/logs

analysis:
  n_case_studies_per_bucket: 2        # 2 TP + 2 FN + 2 FP + 2 TN = 8 per scale
  shape_function_points: 100
